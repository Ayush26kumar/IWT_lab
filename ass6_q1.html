<html>
<head>
    <title>button</title>
    <script>
    function function1() {
        let a = document.getElementsByTagName("h2")[0]; 
        a.innerHTML = "welcome to DOM manipulation"; 
	}
    </script>
</head>
<body>
    <input type="button" name="r" value="click" onclick="function1()">

</body>
</html>
