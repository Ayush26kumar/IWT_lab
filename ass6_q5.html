
<html>
    <head>
        <title>Assignment-6</title>
        <script>
            function checkPrime(event) {
                event.preventDefault();
                const n = parseInt(document.getElementById("num-input").value);
                if (n <= 1) return alert(n + " is not a prime number.");
                let isPrime = true;
                for (let i = 2; i <= Math.sqrt(n); i++) {
                    if (n % i === 0) {
                        isPrime = false;
                        break;
                    }
                }
                alert(isPrime ? n + " is a prime number!" : n + " is not a prime number.");
            }
        </script>
    </head>
    <body>
        <form onsubmit="checkPrime(event)">
            <input type="number" id="num-input" placeholder="Enter a number" required>
            <button type="submit">Check Prime</button>
        </form>
    </body>
</html>
