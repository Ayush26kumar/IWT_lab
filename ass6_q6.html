<html>
<head>
<title>24bcsf53</title>
</head>
<body>

<h3>Currency Converter</h3>
Amount: <input type="number" id="amt"><br><br>

From: 
<select id="from">
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="GBP">GBP</option>
  <option value="INR">INR</option>
  <option value="AUD">AUD</option>
</select>

To: 
<select id="to">
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="GBP">GBP</option>
  <option value="INR" selected>INR</option>
  <option value="AUD">AUD</option>
</select>

<button onclick="convert()">Convert</button>
<p id="output"></p>

<script>
const conversionRates = {
  USD: { EUR: 0.93, GBP: 0.82, INR: 82.74, AUD: 1.47 },
  EUR: { USD: 1.08, GBP: 0.88, INR: 89.06, AUD: 1.58 },
  GBP: { USD: 1.22, EUR: 1.14, INR: 101.5, AUD: 1.80 },
  INR: { USD: 0.012, EUR: 0.011, GBP: 0.0098, AUD: 0.018 },
  AUD: { USD: 0.68, EUR: 0.63, GBP: 0.55, INR: 55.87 }
};

function convert() {
    let amt = document.getElementById("amt").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if (from === to) {
        document.getElementById("output").innerHTML = "Converted: " + amt + " " + to;
        return;
    }

    let rate = conversionRates[from][to];
    let result = amt * rate;
    document.getElementById("output").innerHTML = "Converted: " + result.toFixed(2) + " " + to;
}
</script>

</body>
</html>
